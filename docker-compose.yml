services:
  db:
    image: postgis/postgis:16-3.4
    platform: linux/amd64
    container_name: motoapp-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: motoapp
      POSTGRES_PASSWORD: motoapp_dev
      POSTGRES_DB: motoapp
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
